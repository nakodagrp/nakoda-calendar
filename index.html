<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#059669">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Nakoda Team Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{--primary:#059669;--primary-light:#34D399;--primary-dark:#047857;--accent:#7C3AED;--coral:#F43F5E;--sky:#0EA5E9;--orange:#F59E0B;--success:#10B981;--danger:#EF4444;--bg:#F0FDF4;--card:#FFF;--text:#1E293B;--text-light:#64748B;--border:#D1FAE5;--shadow:0 2px 8px rgba(5,150,105,0.08);--shadow-lg:0 12px 24px rgba(5,150,105,0.12);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(180deg,#ECFDF5,#F0FDF4,#FFF)}
#login h1{font-size:26px;font-weight:800;color:var(--primary-dark);margin-bottom:4px}
#login .sub{color:var(--text-light);font-size:13px;margin-bottom:28px}
.login-box{background:var(--card);border-radius:20px;padding:28px;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.login-box label{display:block;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--primary-dark);margin-bottom:5px}
.login-box input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:16px;background:#F0FDF4}
.login-box input:focus{outline:none;border-color:var(--primary);background:#FFF;box-shadow:0 0 0 4px rgba(5,150,105,.1)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#059669,#047857);color:#FFF;width:100%;justify-content:center;box-shadow:0 4px 12px rgba(5,150,105,.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#FFF}
.btn-accent{background:var(--accent);color:#FFF}
.login-err{color:var(--danger);font-size:12px;font-weight:600;margin-bottom:10px;display:none}

/* APP */
#app{display:none}
.header{background:linear-gradient(135deg,#059669,#047857,#065F46);color:#FFF;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(5,150,105,.2)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.header h1{font-size:17px;font-weight:800}
.user-pill{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;backdrop-filter:blur(8px)}
.role-badge{background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:6px}
.sync-row{display:flex;align-items:center;gap:6px;font-size:10px;opacity:.85}
.dot{width:7px;height:7px;border-radius:50%;background:#34D399;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot.off{background:var(--coral);animation:none}

/* PERFORMANCE BAR */
.perf-bar{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);padding:8px 16px;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid rgba(255,255,255,.1)}
.perf-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:12px;white-space:nowrap;font-size:11px;font-weight:600;color:#FFF}
.perf-chip .perf-pct{font-weight:800;font-size:12px}
.perf-chip .perf-pct.high{color:#34D399}
.perf-chip .perf-pct.mid{color:#FBBF24}
.perf-chip .perf-pct.low{color:#FB7185}

/* NAV */
.nav{display:flex;background:#FFF;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav button{flex:1;padding:10px 4px 7px;border:none;background:none;font-size:10px;font-weight:700;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;text-align:center;white-space:nowrap}
.nav button.on{color:var(--primary);border-bottom-color:var(--primary);background:#F0FDF4}
.nav button .ic{display:block;font-size:17px;margin-bottom:2px}
.nav button .badge{display:inline-flex;align-items:center;justify-content:center;background:var(--coral);color:#FFF;font-size:9px;min-width:15px;height:15px;border-radius:8px;padding:0 3px;margin-left:2px;font-weight:800}

/* DATE NAV */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#FFF;border-bottom:1px solid var(--border)}
.date-bar button{background:#ECFDF5;border:2px solid var(--border);border-radius:8px;padding:7px 11px;cursor:pointer;color:var(--primary-dark);font-size:14px;font-weight:700}
.date-bar .date-txt{font-weight:700;font-size:14px;color:var(--primary-dark)}
.date-bar .today-btn{background:var(--primary);color:#FFF;border-color:var(--primary);font-size:10px;padding:4px 8px;margin-top:3px;border-radius:6px}

/* SLOTS */
.slot{display:flex;border-bottom:1px solid var(--border);min-height:56px}
.slot:nth-child(even){background:rgba(236,253,245,.5)}
.slot:nth-child(odd){background:rgba(240,253,244,.3)}
.slot .time{width:58px;min-width:58px;padding:6px 5px;font-size:10px;font-weight:700;color:var(--primary-dark);text-align:right;border-right:2px solid var(--border);background:rgba(209,250,229,.25)}
.slot .content{flex:1;padding:0;cursor:pointer;display:flex;flex-direction:column;position:relative;min-height:56px}
.slot .content:empty::after{content:'';display:block;width:100%;height:100%}
.chip{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:0;font-size:12px;font-weight:600;cursor:pointer;width:100%;flex:1;min-height:56px;border-left:4px solid transparent;box-sizing:border-box}
.chip:active{opacity:.85}
.chip.online{background:#EDE9FE !important;color:#6D28D9;border-left-color:#8B5CF6}
.chip.offline{background:#FFE4E6 !important;color:#BE123C;border-left-color:#F43F5E}
.chip.call{background:#E0F2FE !important;color:#0369A1;border-left-color:#0EA5E9}
.slot .add-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--primary);color:#FFF;border:none;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(5,150,105,.3)}
.slot .content:hover .add-btn{display:flex}
.slot.has-event{background:transparent !important}

/* TASKS */
.tasks-wrap{padding:12px 14px 90px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-head h2{font-size:17px;font-weight:800;color:var(--primary-dark)}
.filters{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filters button{padding:6px 11px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:2px solid var(--border);background:#FFF;color:var(--text-light);font-family:inherit}
.filters button.on{border-color:var(--primary);background:var(--primary);color:#FFF;box-shadow:0 3px 8px rgba(5,150,105,.3)}
.filters button.on-accent{border-color:var(--accent);background:var(--accent);color:#FFF}
.filters button.on-coral{border-color:var(--coral);background:var(--coral);color:#FFF}
.filters button .cnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.1);border-radius:7px;min-width:16px;height:16px;font-size:9px;margin-left:3px;padding:0 3px}
.filters button.on .cnt,.filters button.on-accent .cnt,.filters button.on-coral .cnt{background:rgba(255,255,255,.3)}

.task-card{background:var(--card);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);border-left:5px solid var(--border);transition:all .2s}
.task-card:active{transform:scale(.99)}
.task-card.s-ongoing{border-left-color:var(--accent);background:linear-gradient(90deg,rgba(124,58,237,.03),#FFF)}
.task-card.s-complete{border-left-color:var(--success);background:linear-gradient(90deg,rgba(16,185,129,.03),#FFF)}
.task-card.s-attention{border-left-color:var(--coral);background:linear-gradient(90deg,rgba(244,63,94,.03),#FFF)}
.task-card .t-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.task-card .t-title{font-weight:700;font-size:13px;flex:1}
.task-card.s-complete .t-title{text-decoration:line-through;color:var(--text-light)}
.s-badge{padding:3px 8px;border-radius:10px;font-size:9px;font-weight:800;text-transform:uppercase;white-space:nowrap}
.s-badge.ongoing{background:#EDE9FE;color:#5B21B6}
.s-badge.complete{background:#D1FAE5;color:#065F46}
.s-badge.attention{background:#FFE4E6;color:#9F1239}
.s-badge.pending{background:#F1F5F9;color:#64748B}
.task-card .t-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:11px;color:var(--text-light)}
.task-card .t-meta i{width:11px}
.t-actions{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.t-actions button{padding:4px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:2px solid;font-family:inherit;display:inline-flex;align-items:center;gap:3px}
.t-actions button:active{transform:scale(.94)}
.t-actions .a-ongoing{border-color:var(--accent);color:var(--accent);background:#FFF}
.t-actions .a-done{border-color:var(--success);color:var(--success);background:#FFF}
.t-actions .a-attn{border-color:var(--coral);color:var(--coral);background:#FFF}

/* MEETINGS LIST */
.meet-list{padding:12px 14px 90px}
.meet-card{background:var(--card);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);border-left:5px solid var(--accent)}
.meet-card.type-offline{border-left-color:var(--coral)}
.meet-card.type-call{border-left-color:var(--sky)}
.meet-card .m-title{font-weight:700;font-size:13px;margin-bottom:4px}
.meet-card .m-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--text-light)}
.type-pill{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;text-transform:uppercase;color:#FFF}
.type-pill.online{background:var(--accent)}
.type-pill.offline{background:var(--coral)}
.type-pill.call{background:var(--sky)}

/* RECURRING */
.recur-card{background:var(--card);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);border-left:5px solid var(--orange)}
.recur-card .r-freq{font-size:9px;font-weight:800;text-transform:uppercase;padding:2px 7px;border-radius:6px;background:#FEF3C7;color:#92400E}

/* TEAM VIEW */
.team-wrap{padding:14px 16px 90px}
.team-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center}
.team-card .t-left{flex:1}
.team-card .name{font-weight:700;font-size:14px}
.team-card .t-perf{font-size:11px;color:var(--text-light);margin-top:2px}
.team-card .role{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:8px}
.team-card .role.owner{background:#D1FAE5;color:#065F46}
.team-card .role.ea{background:#EDE9FE;color:#5B21B6}
.team-card .role.member{background:#F1F5F9;color:#64748B}
.team-card .t-right{display:flex;align-items:center;gap:6px}
.team-card .edit-btn{background:#ECFDF5;border:2px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;font-size:11px;color:var(--primary-dark)}
.team-card .view-btn{background:#EDE9FE;border:2px solid #DDD6FE;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:11px;color:var(--accent)}

/* MEMBER DETAIL VIEW */
.member-detail{padding:14px 16px 90px}
.member-header{background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(5,150,105,.05));border-radius:14px;padding:16px;margin-bottom:14px;border:2px solid #EDE9FE}
.member-header .mh-name{font-size:18px;font-weight:800;color:var(--primary-dark)}
.member-header .mh-role{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-top:2px}
.member-header .mh-perf{margin-top:8px;font-size:13px;font-weight:700}
.member-tabs{display:flex;gap:6px;margin-bottom:14px}
.member-tabs button{padding:7px 14px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#FFF;color:var(--text-light);font-family:inherit}
.member-tabs button.on{border-color:var(--accent);background:var(--accent);color:#FFF}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:1000;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:#FFF;width:100%;max-width:440px;max-height:85vh;border-radius:22px 22px 0 0;padding:22px;overflow-y:auto;animation:up .3s ease-out;box-shadow:0 -10px 40px rgba(0,0,0,.15)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:600px){.modal{border-radius:18px;margin:auto;max-height:80vh}.overlay{align-items:center}}
.modal h2{font-size:17px;font-weight:800;color:var(--primary-dark);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal h2 button{background:#F0FDF4;border:none;font-size:15px;cursor:pointer;color:var(--primary-dark);padding:5px 9px;border-radius:8px}
.fg{margin-bottom:13px}
.fg label{display:block;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--primary-dark);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:#FAFFFE}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);background:#FFF;box-shadow:0 0 0 3px rgba(5,150,105,.08)}
.fg textarea{resize:vertical;min-height:55px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;justify-content:center}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#059669,#047857);color:#FFF;border:none;font-size:22px;cursor:pointer;box-shadow:0 6px 20px rgba(5,150,105,.4);z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1) rotate(90deg)}
.fab:active{transform:scale(.95)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty i{font-size:44px;margin-bottom:10px;color:var(--border)}
.empty p{font-size:12px;line-height:1.5}

/* RESPONSIVE */
@media(max-width:480px){.header h1{font-size:15px}.slot .time{width:48px;min-width:48px;font-size:9px}.form-row{grid-template-columns:1fr}.date-bar .date-txt{font-size:12px}.nav button{font-size:9px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1><i class="fas fa-users"></i> Team Calendar</h1>
  <p class="sub">Calendar & task manager for your team</p>
  <div class="login-box">
    <div class="login-err" id="login-err"></div>
    <label>Username</label>
    <input type="text" id="l-user" placeholder="Enter your username">
    <label>Password</label>
    <input type="password" id="l-pass" placeholder="Enter your password">
    <button class="btn btn-primary" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div style="margin-top:12px"><button class="btn btn-outline btn-sm" onclick="demoLogin()" style="width:100%"><i class="fas fa-play"></i> Try Demo</button></div>
    <div id="setup-link" style="margin-top:14px;text-align:center"><a href="#" onclick="showSetup();return false" style="color:var(--primary);font-size:12px;font-weight:600"><i class="fas fa-cog"></i> First-time Setup</a></div>
    <div id="install-login" style="display:none;margin-top:12px"><button class="btn btn-accent" onclick="installApp()" style="width:100%;justify-content:center;background:linear-gradient(135deg,#E31E24,#C41920)"><i class="fas fa-download"></i> Install App</button></div>
  </div>
</div>

<!-- SETUP MODAL -->
<div class="overlay" id="m-setup"><div class="modal">
  <h2><span><i class="fas fa-cog"></i> One-Time Setup</span><button onclick="closeM('m-setup')"><i class="fas fa-times"></i></button></h2>
  <p style="font-size:12px;color:var(--text-light);margin-bottom:14px;line-height:1.6">Paste your Google Apps Script URL below. Once per device only.</p>
  <div class="fg"><label>Server URL</label><input type="text" id="setup-url" placeholder="Paste your Web App URL"></div>
  <div class="modal-btns"><button class="btn btn-outline" onclick="closeM('m-setup')">Cancel</button><button class="btn btn-primary" onclick="saveSetupUrl()"><i class="fas fa-check"></i> Save</button></div>
</div></div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <h1><i class="fas fa-users"></i> Team Calendar</h1>
      <span class="user-pill" id="u-pill">User <span class="role-badge" id="u-role">member</span></span>
    </div>
    <div class="sync-row"><span class="dot" id="dot"></span><span id="sync-txt">Synced</span><span style="margin-left:auto;opacity:.5;font-size:9px;cursor:pointer" onclick="forceUpdate()" title="Tap to check for updates">v6</span></div>
  </div>
  <!-- INSTALL BANNER -->
  <div id="install-banner" style="display:none;background:linear-gradient(135deg,#E31E24,#C41920);padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:10px">
    <span style="color:#FFF;font-size:12px;font-weight:600"><i class="fas fa-download"></i> Install Nakoda Calendar as App</span>
    <div style="display:flex;gap:6px">
      <button onclick="installApp()" style="background:#FFF;color:#E31E24;border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Install</button>
      <button onclick="dismissInstall()" style="background:rgba(255,255,255,.2);color:#FFF;border:none;padding:6px 8px;border-radius:8px;font-size:11px;cursor:pointer"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <div class="perf-bar" id="perf-bar"></div>

  <div class="nav" id="nav">
    <button class="on" data-v="daily" onclick="go('daily')"><span class="ic"><i class="fas fa-calendar-day"></i></span>Daily</button>
    <button data-v="weekly" onclick="go('weekly')"><span class="ic"><i class="fas fa-calendar-week"></i></span>Weekly</button>
    <button data-v="tasks" onclick="go('tasks')"><span class="ic"><i class="fas fa-tasks"></i></span>Tasks<span class="badge" id="t-badge" style="display:none">0</span></button>
    <button data-v="recurring" onclick="go('recurring')"><span class="ic"><i class="fas fa-repeat"></i></span>Recurring</button>
    <button data-v="meetings" onclick="go('meetings')"><span class="ic"><i class="fas fa-video"></i></span>Meetings</button>
    <button data-v="team" onclick="go('team')"><span class="ic"><i class="fas fa-user-group"></i></span>Team</button>
  </div>

  <div class="date-bar" id="date-bar">
    <button onclick="navDate(-1)"><i class="fas fa-chevron-left"></i></button>
    <div style="text-align:center"><div class="date-txt" id="date-lbl"></div><button class="today-btn" onclick="goToday()">Today</button></div>
    <button onclick="navDate(1)"><i class="fas fa-chevron-right"></i></button>
  </div>

  <div id="v-daily"></div>
  <div id="v-weekly" style="display:none;overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
  <div id="v-tasks" class="tasks-wrap" style="display:none"></div>
  <div id="v-recurring" class="tasks-wrap" style="display:none"></div>
  <div id="v-meetings" class="meet-list" style="display:none"></div>
  <div id="v-team" class="team-wrap" style="display:none"></div>

  <button class="fab" id="fab" onclick="fabAction()"><i class="fas fa-plus"></i></button>
</div>

<!-- EVENT MODAL -->
<div class="overlay" id="m-event"><div class="modal">
  <h2><span id="me-title">Schedule Meeting</span><button onclick="closeM('m-event')"><i class="fas fa-times"></i></button></h2>
  <div class="fg"><label>Title</label><input id="me-name" placeholder="Meeting topic"></div>
  <div class="fg"><label>Person / Company</label><input id="me-person" placeholder="Who is this with?"></div>
  <div class="fg"><label>Date</label><input type="date" id="me-date"></div>
  <div class="form-row">
    <div class="fg"><label>Start</label><select id="me-start" onchange="autoEnd()"></select></div>
    <div class="fg"><label>End</label><select id="me-end"></select></div>
  </div>
  <div class="fg"><label>Type</label><select id="me-type">

<script>

let URL='',USER='',ROLE='',isDemo=false;

let events={},tasks={},users=[],recurring=[];
let editEvId=null,editTaskId=null,editUserName=null,editRecurId=null,taskFilter='all';

const SLOTS=[];
for(let h=8;h<=18;h++)for(let m=0;m<60;m+=30){if(h===18&&m>0)break;SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);}

function showSetup(){document.getElementById('m-setup').classList.add('on');const saved=localStorage.getItem('tc_url');if(saved)document.getElementById('setup-url').value=saved;}
function saveSetupUrl(){const u=document.getElementById('setup-url').value.trim();if(!u){alert('Please paste the Server URL');return;}localStorage.setItem('tc_url',u);URL=u;closeM('m-setup');document.getElementById('setup-link').innerHTML='<span style="color:var(--success);font-size:12px;font-weight:600"><i class="fas fa-check-circle"></i> Server connected</span> &nbsp;<a href="#" onclick="showSetup();return false" style="color:var(--text-light);font-size:11px"><i class="fas fa-pen"></i> Change</a>';alert('Setup saved!');}

// ═══ LOGIN ═══
async function doLogin(){
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value.trim();

  if(!user||!pass){showLoginErr('Enter username and password.');return;}
  if(!URL){showLoginErr('Server not configured. Tap "First-time Setup" below.');return;}
  showLoginErr('');
  try{
    const r=await fetch(`${URL}?action=login&user=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
    const d=await r.json();
    if(d.error){showLoginErr(d.error);return;}
    USER=d.username;ROLE=d.role;
    localStorage.setItem('tc_user',USER);localStorage.setItem('tc_pass',pass);

  }catch(e){showLoginErr('Cannot connect. Check setup.');}
}
function showLoginErr(msg){const el=document.getElementById('login-err');el.textContent=msg;el.style.display=msg?'block':'none';}

}
function startApp(){

(function(){

// ═══ API ═══
async function apiGet(action){const r=await fetch(`${URL}?action=${action}&user=${encodeURIComponent(USER)}`);return r.json();}

function saveLocal(){localStorage.setItem('tc_ev',JSON.stringify(events));localStorage.setItem('tc_tk',JSON.stringify(tasks));localStorage.setItem('tc_us',JSON.stringify(users));localStorage.setItem('tc_rc',JSON.stringify(recurring));}

  else{

    users=[{username:'Jitendra',role:'owner'},{username:'EA',role:'ea'},{username:'Rahul',role:'member'},{username:'Priya',role:'member'},{username:'Amit',role:'member'}];
    events={e1:{id:'e1',title:'Board Meeting',person:'Board',date:td,start:'09:00',end:'10:00',type:'online',createdBy:'Jitendra'},e2:{id:'e2',title:'Client Call',person:'Vendor',date:td,start:'11:00',end:'11:30',type:'call',createdBy:'Jitendra'},e3:{id:'e3',title:'Team Sync',person:'Team',date:td,start:'14:00',end:'14:30',type:'offline',createdBy:'Rahul'}};

    t2:{id:'t2',title:'Review vendor contract',description:'',assignedTo:'Jitendra',assignedBy:'EA',status:'attention',priority:'high',dueDate:td,createdBy:'EA',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},
    t3:{id:'t3',title:'Update CRM data',description:'',assignedTo:'Amit',assignedBy:'Jitendra',status:'pending',priority:'medium',dueDate:td,createdBy:'Jitendra',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},
    t4:{id:'t4',title:'Book travel tickets',description:'',assignedTo:'EA',assignedBy:'Jitendra',status:'complete',priority:'low',dueDate:yd,createdBy:'Jitendra',createdAt:new Date(Date.now()-172800000).toISOString(),updatedAt:new Date(Date.now()-50000000).toISOString()},
    t5:{id:'t5',title:'Send follow-up emails',description:'',assignedTo:'Rahul',assignedBy:'Jitendra',status:'complete',priority:'medium',dueDate:yd,createdBy:'Jitendra',createdAt:new Date(Date.now()-259200000).toISOString(),updatedAt:new Date(Date.now()-172800000).toISOString()},

    recurring=[{id:'rc1',title:'Weekly Team Standup Report',description:'Submit weekly progress',assignedTo:'Rahul',frequency:'weekly',day:'Friday',priority:'medium',createdBy:'Jitendra'},{id:'rc2',title:'Monthly Invoice Review',description:'Check all vendor invoices',assignedTo:'EA',frequency:'monthly',day:'25',priority:'high',createdBy:'Jitendra'}];
    saveLocal();
  }
  ROLE='owner';populateAssign();
}

// ═══ PERFORMANCE ═══
function calcPerformance(){
  const perf={};
  users.forEach(u=>{perf[u.username]={total:0,onTime:0};});
  Object.values(tasks).forEach(t=>{
    if(t.status==='complete'&&t.assignedTo&&t.dueDate){
      const name=t.assignedTo;
      if(!perf[name])perf[name]={total:0,onTime:0};
      perf[name].total++;
      const due=new Date(t.dueDate+'T23:59:59');
      const completed=t.updatedAt?new Date(t.updatedAt):new Date();
      if(completed<=due)perf[name].onTime++;
    }
  });
  return perf;
}
function renderPerfBar(){
  const perf=calcPerformance();
  const bar=document.getElementById('perf-bar');
  // Everyone sees only their own % on main screen
  const p=perf[USER]||{total:0,onTime:0};
  const pct=p.total>0?Math.round((p.onTime/p.total)*100):0;
  const cls=pct>=80?'high':pct>=50?'mid':'low';
  let h='';
  if(p.total>0){
    h+=`<div class="perf-chip"><span>My Performance</span><span class="perf-pct ${cls}">${pct}%</span></div>`;
    h+=`<div class="perf-chip" style="opacity:.7"><span>${p.onTime}/${p.total} on time</span></div>`;
  }else{
    h+='<div class="perf-chip" style="opacity:.6"><span>Complete tasks to see your performance</span></div>';
  }
  bar.innerHTML=h;
}

function render(){updateDate();updateBadge();renderPerfBar();
  if(view==='daily')renderDaily();else if(view==='weekly')renderWeekly();

  else if(view==='meetings')renderMeetings();else if(view==='team')renderTeam();}

// ═══ HELPERS ═══
// Fix dates from Google Sheets (they come as "Sat May 17 2026..." or Date objects instead of "2026-05-17")
function fixDate(val){
  if(!val)return'';
  const s=String(val).trim();
  // Already in YYYY-MM-DD format
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // Try parsing as date
  const d=new Date(s);
  if(!isNaN(d.getTime()))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return s;
}
// Fix time values from Sheets (might come as "1899-12-30T09:00:00.000Z" or Date object)
function fixTime(val){
  if(!val)return'';
  const s=String(val).trim();
  // Already HH:MM
  if(/^\d{2}:\d{2}$/.test(s))return s;
  // Parse as Date — converts UTC to local timezone correctly
  const d=new Date(s);
  if(!isNaN(d.getTime()))return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  // Fallback: extract HH:MM from any string
  const m=s.match(/(\d{2}):(\d{2})/);
  if(m)return m[1]+':'+m[2];
  return s;
}
// Normalize all events and tasks after fetching
function normalizeData(){
  Object.values(events).forEach(ev=>{
    ev.date=fixDate(ev.date);
    ev.start=fixTime(ev.start);
    ev.end=fixTime(ev.end);
  });
  Object.values(tasks).forEach(t=>{
    t.dueDate=fixDate(t.dueDate);
  });
}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isToday(d){const t=new Date();return d.toDateString()===t.toDateString();}
function navDate(dir){curDate.setDate(curDate.getDate()+dir*(view==='weekly'?7:1));render();}
function goToday(){curDate=new Date();render();}
function updateDate(){const o=view==='weekly'?{month:'long',year:'numeric'}:{weekday:'short',month:'long',day:'numeric'};document.getElementById('date-lbl').textContent=curDate.toLocaleDateString('en-US',o);}
function fmtT(t){if(!t)return'';const[h,m]=t.split(':');const hr=+h;return `${hr===0?12:hr>12?hr-12:hr}:${m}${hr>=12?'pm':'am'}`;}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function updateBadge(){const n=Object.values(tasks).filter(t=>t.status==='attention').length;const b=document.getElementById('t-badge');if(n>0){b.textContent=n;b.style.display='';}else b.style.display='none';}
function getWeek(){const d=new Date(curDate);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));const ds=[];for(let i=0;i<7;i++){ds.push(new Date(d));d.setDate(d.getDate()+1);}return ds;}
function slotsFor(ds,t){return Object.entries(events).filter(([id,ev])=>{if(ev.date!==ds)return false;return ev.start<=t&&t<ev.end;});}
function populateSelects(){['me-start','me-end'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='';SLOTS.forEach(t=>s.innerHTML+=`<option value="${t}">${fmtT(t)}</option>`);});}
function populateAssign(){const ids=['mt-assign','mr-assign'];ids.forEach(id=>{const s=document.getElementById(id);if(!s)return;s.innerHTML='<option value="">Unassigned</option>';users.forEach(u=>s.innerHTML+=`<option value="${esc(u.username)}">${esc(u.username)} (${u.role})</option>`);});}
function autoEnd(){const v=document.getElementById('me-start').value;const i=SLOTS.indexOf(v);if(i>=0&&i<SLOTS.length-1)document.getElementById('me-end').value=SLOTS[i+1];}
function fabAction(){if(view==='tasks')openTaskM();else if(view==='recurring')openRecurM();else if(view==='team')openUserM();else openEvM();}
function closeM(id){document.getElementById(id).classList.remove('on');}

// ═══ DAILY ═══
function renderDaily(){
  const c=document.getElementById('v-daily'),ds=fmtD(curDate);let h='';
  SLOTS.forEach(t=>{
    const se=slotsFor(ds,t);let chips='';
    se.forEach(([id,ev])=>{const ic={online:'fa-video',offline:'fa-building',call:'fa-phone'};
      const si=SLOTS.indexOf(t);const prevSlot=si>0?SLOTS[si-1]:null;const isFirst=!prevSlot||!(ev.start<=prevSlot&&prevSlot<ev.end);
      chips+=`<div class="chip ${ev.type||'online'}" onclick="event.stopPropagation();editEv('${id}')">${isFirst?`<i class="fas ${ic[ev.type]||'fa-calendar'}"></i> ${esc(ev.title)}${ev.person?' — '+esc(ev.person):''}`:''}</div>`;});
    h+=`<div class="slot"><div class="time">${fmtT(t)}</div><div class="content" onclick="openEvSlot('${ds}','${t}')">${chips}${!chips?'<button class="add-btn"><i class="fas fa-plus"></i></button>':''}</div></div>`;
  });
  c.innerHTML=h;
}

// ═══ WEEKLY ═══
function renderWeekly(){
  const c=document.getElementById('v-weekly'),dates=getWeek(),dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h='<div style="display:grid;grid-template-columns:50px repeat(7,minmax(80px,1fr));min-width:560px">';
  h+='<div style="background:#ECFDF5;padding:6px;border-bottom:2px solid var(--border);border-right:1px solid var(--border)"></div>';
  dates.forEach((d,i)=>{const tc=isToday(d)?'background:var(--primary-light);color:#FFF;':'background:#ECFDF5;color:var(--primary-dark);';
    h+=`<div style="${tc}padding:6px 3px;text-align:center;border-bottom:2px solid var(--border);border-right:1px solid var(--border);font-size:10px;font-weight:700"><div style="font-size:9px;opacity:.7">${dn[i]}</div>${d.getDate()}</div>`;});
  SLOTS.forEach(t=>{
    h+=`<div style="padding:2px 3px;font-size:8px;font-weight:700;color:var(--primary-dark);text-align:right;border-right:2px solid var(--border);border-bottom:1px solid rgba(209,250,229,.5);background:rgba(209,250,229,.15);min-height:34px;display:flex;align-items:center;justify-content:flex-end">${fmtT(t)}</div>`;
    dates.forEach(d=>{const ds=fmtD(d);const se=slotsFor(ds,t);
      if(se.length>0){const ev=se[0][1];const id=se[0][0];const bg=ev.type==='call'?'#E0F2FE':ev.type==='offline'?'#FFE4E6':'#EDE9FE';const clr=ev.type==='call'?'#0369A1':ev.type==='offline'?'#BE123C':'#6D28D9';const brd=ev.type==='call'?'#0EA5E9':ev.type==='offline'?'#F43F5E':'#8B5CF6';
        const si=SLOTS.indexOf(t);const prevSlot=si>0?SLOTS[si-1]:null;const isFirst=!prevSlot||!(ev.start<=prevSlot&&prevSlot<ev.end);
        h+=`<div onclick="event.stopPropagation();editEv('${id}')" style="background:${bg};border-right:1px solid rgba(209,250,229,.5);border-bottom:${isFirst?'none':'1px solid rgba(209,250,229,.2)'};border-left:3px solid ${brd};padding:3px 4px;min-height:34px;cursor:pointer;display:flex;align-items:center">${isFirst?`<div style="color:${clr};font-size:8px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ev.title)}</div>`:''}</div>`;
      }else{const tc=isToday(d)?'background:rgba(52,211,153,.06);':'background:rgba(240,253,244,.4);';
        h+=`<div style="${tc}border-right:1px solid rgba(209,250,229,.5);border-bottom:1px solid rgba(209,250,229,.3);padding:1px;min-height:34px;cursor:pointer" onclick="openEvSlot('${ds}','${t}')"></div>`;}});
  });
  h+='</div>';c.innerHTML=h;
}

// ═══ TASKS ═══
function renderTasks(){
  const c=document.getElementById('v-tasks');
  const all=Object.entries(tasks);
  const counts={all:all.length,mine:0,attention:0,ongoing:0,pending:0,complete:0};
  all.forEach(([,t])=>{if(counts[t.status]!==undefined)counts[t.status]++;if(t.assignedTo&&t.assignedTo.toLowerCase()===USER.toLowerCase())counts.mine++;});

  let fil=all;
  if(taskFilter==='mine')fil=all.filter(([,t])=>t.assignedTo&&t.assignedTo.toLowerCase()===USER.toLowerCase());
  else if(taskFilter!=='all')fil=all.filter(([,t])=>t.status===taskFilter);
  fil.sort((a,b)=>{const so={attention:0,ongoing:1,pending:2,complete:3},po={high:0,medium:1,low:2};
    if(so[a[1].status]!==so[b[1].status])return(so[a[1].status]??2)-(so[b[1].status]??2);return(po[a[1].priority]||1)-(po[b[1].priority]||1);});

  let h=`<div class="section-head"><h2><i class="fas fa-tasks"></i> Tasks</h2><button class="btn btn-primary btn-sm" onclick="openTaskM()"><i class="fas fa-plus"></i> Add</button></div>`;
  h+='<div class="filters">';
  [['all','All','on'],['mine','My Tasks','on-accent'],['attention','Attention','on-coral'],['ongoing','Ongoing','on'],['pending','Pending','on'],['complete','Done','on']].forEach(([k,l,cls])=>{
    const act=taskFilter===k;h+=`<button class="${act?cls:''}" onclick="taskFilter='${k}';renderTasks()">${l}<span class="cnt">${counts[k]||0}</span></button>`;});
  h+='</div>';
  if(!fil.length)h+='<div class="empty"><i class="fas fa-clipboard-check"></i><p>No tasks here</p></div>';
  fil.forEach(([id,t])=>{h+=renderTaskCard(id,t);});

}
function renderTaskCard(id,t){
  const sc='s-'+(t.status||'pending');const labels={ongoing:'Ongoing',complete:'Complete',attention:'Attention',pending:'Pending'};
  const prio=t.priority==='high'?'<i class="fas fa-arrow-up" style="color:var(--coral);font-size:10px"></i> ':t.priority==='low'?'<i class="fas fa-arrow-down" style="color:var(--success);font-size:10px"></i> ':'';
  const isOverdue=t.status!=='complete'&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date();
  return `<div class="task-card ${sc}" onclick="editTask('${id}')">
    <div class="t-top"><div class="t-title">${prio}${esc(t.title)}</div><span class="s-badge ${t.status||'pending'}">${labels[t.status]||'Pending'}</span></div>
    ${t.description?`<div style="font-size:11px;color:var(--text-light);margin-top:3px">${esc(t.description)}</div>`:''}
    <div class="t-meta">
      ${t.assignedTo?`<span><i class="fas fa-user" style="color:var(--accent)"></i> ${esc(t.assignedTo)}</span>`:''}
      ${t.dueDate?`<span style="${isOverdue?'color:var(--coral);font-weight:700':''}"><i class="fas fa-clock" style="color:${isOverdue?'var(--coral)':'var(--primary)'}"></i> ${new Date(t.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}${isOverdue?' (Overdue)':''}</span>`:''}
      ${t.assignedBy?`<span><i class="fas fa-paper-plane" style="color:var(--primary)"></i> by ${esc(t.assignedBy)}</span>`:''}
    </div>
    <div class="t-actions" onclick="event.stopPropagation()">
      ${t.status!=='ongoing'?`<button class="a-ongoing" onclick="qStatus('${id}','ongoing')"><i class="fas fa-spinner"></i> Ongoing</button>`:''}
      ${t.status!=='complete'?`<button class="a-done" onclick="qStatus('${id}','complete')"><i class="fas fa-check"></i> Done</button>`:''}
      ${t.status!=='attention'?`<button class="a-attn" onclick="qStatus('${id}','attention')"><i class="fas fa-exclamation"></i> Attention</button>`:''}
    </div></div>`;
}
async function qStatus(id,s){
  tasks[id].status=s;tasks[id].updatedAt=new Date().toISOString();
  if(isDemo)saveLocal();else{try{await apiPost({action:'updateTaskStatus',id,status:s});}catch(e){}}

}

    // Fallback: show manual instructions
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){alert('To install:\n1. Tap the Share button (bottom bar)\n2. Tap "Add to Home Screen"');}
    else{alert('To install:\n1. Tap ⋮ menu (top-right)\n2. Tap "Add to Home screen" or "Install app"');}
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((result)=>{
    if(result.outcome==='accepted'){
      document.getElementById('install-banner').style.display='none';
      document.getElementById('install-login').style.display='none';
    }
    deferredPrompt=null;
  });
}
function dismissInstall(){
  document.getElementById('install-banner').style.display='none';
  localStorage.setItem('tc_install_dismissed','1');
}
// Hide install UI if already installed
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').style.display='none';
  document.getElementById('install-login').style.display='none';
  deferredPrompt=null;
});
</script>
</body>
</html>
